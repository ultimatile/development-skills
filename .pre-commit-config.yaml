# mdformat with the gfm + frontmatter plugins handles Markdown formatting:
# `--number` renumbers ordered lists, `--compact-tables` strips table-cell padding.
# The frontmatter plugin splits YAML frontmatter from the body so both survive a pass.
repos:
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [--number, --compact-tables]
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
